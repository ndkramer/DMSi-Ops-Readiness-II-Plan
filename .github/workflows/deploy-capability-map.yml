# Deploy Capability Map to existing AWS Lambda.
# Pushes the latest capability-map.html and Lambda handler to your Lambda on push to main
# or when run manually.
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (or configure OIDC and use role)
#   LAMBDA_FUNCTION_NAME                       (e.g. capability-map or your Lambda name)
# Optional: AWS_REGION (defaults to us-east-2 for capability-map Lambda)
#
# Path filters: a push must change at least one listed path (empty commits do not trigger).
#
# Dependency graph JSON (Outcome maps load these at runtime):
#   WSA/PA/pa-outcomes.json  → dependency_edges
#   WSB-WSC/wsb-wsc-outcome-dependencies.json  → dependency_edges
# Catalog: WSB-WSC/dependency-sources.yml

name: Deploy Capability Map to Lambda

on:
  push:
    branches: [main]
    paths:
      - 'Capability-map/capability-map.html'
      - 'Capability-map/capability-map-dmsi.html'
      - 'Capability-map/capability-map-state.json'
      - 'Capability-map/capability-map-artifacts-dmsi.json'
      - 'Capability-map/index.mjs'
      - 'Project-Plan/Combined-Outcome-Gantt.html'
      - 'Project-Plan/gantt-data.json'
      - 'Project-Plan/project-milestones.json'
      - 'WSA/'
      - 'WSB-WSC/WB/'
      - 'WSB-WSC/'
      - 'WSB-WSC/wsb-wsc-outcome-dependencies.json'
      - 'WSB-WSC/dependency-sources.yml'
      - 'WSA/PA/pa-outcomes.json'
      - '.github/workflows/deploy-capability-map.yml'
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          cd Capability-map
          zip -r ../deploy.zip index.mjs capability-map.html capability-map-dmsi.html capability-map-state.json capability-map-artifacts-dmsi.json
          cd ../Project-Plan
          # Root of zip: legacy Lambda URLs …/Combined-Outcome-Gantt.html
          zip -g ../deploy.zip Combined-Outcome-Gantt.html gantt-data.json project-milestones.json
          cd ..
          # Repo-style paths: …/Project-Plan/Combined-Outcome-Gantt.html (Confluence / bookmarks)
          zip -g deploy.zip \
            Project-Plan/Combined-Outcome-Gantt.html \
            Project-Plan/gantt-data.json \
            Project-Plan/project-milestones.json
          zip -r deploy.zip WSA/WM WSA/VI WSA/PA WSB-WSC/WB
          zip -j -g deploy.zip WSB-WSC/WSB-WSC-Outcome-Map.html
          zip -j -g deploy.zip WSB-WSC/wsb-wsc-outcome-dependencies.json WSB-WSC/dependency-sources.yml
          echo "Package size: $(du -h deploy.zip | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://deploy.zip

      - name: Wait for Lambda to be updated
        run: |
          aws lambda wait function-updated \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}"

      - name: Deployment summary
        run: |
          echo "Deployed capability-map to Lambda: ${{ secrets.LAMBDA_FUNCTION_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
