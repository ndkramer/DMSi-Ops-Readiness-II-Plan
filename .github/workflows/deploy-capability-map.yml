# Deploy Capability Map to existing AWS Lambda.
# Pushes the latest capability-map.html and Lambda handler to your Lambda on push to main
# or when run manually.
#
# Required GitHub secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY  (or configure OIDC and use role)
#   LAMBDA_FUNCTION_NAME                       (e.g. capability-map or your Lambda name)
# Optional: AWS_REGION (defaults to us-east-2 for capability-map Lambda)
# Optional: STALLED_BLOCKED_GITHUB_PAT — GitHub PAT for Project-Plan/Stalled-Blocked-rpt.html only.
#   Written to Stalled-Blocked-github-token.local.json inside the zip at deploy time (never committed).
#
# Path filters: a push must change at least one listed path (empty commits do not trigger).
#
# Dependency graph JSON (Outcome maps load these at runtime):
#   WSA/PA/pa-outcomes.json  → dependency_edges
#   WSB-WSC/wsb-wsc-outcome-dependencies.json  → dependency_edges
# Catalog: WSB-WSC/dependency-sources.yml

name: Deploy Capability Map to Lambda

on:
  push:
    branches: [main]
    paths:
      - 'Capability-map/capability-map.html'
      - 'Capability-map/capability-map-dmsi.html'
      - 'Capability-map/capability-map-state.json'
      - 'Capability-map/capability-map-artifacts-dmsi.json'
      - 'Capability-map/index.mjs'
      - 'Project-Plan/Milestones/**'
      - 'Project-Plan/Combined-Outcome-Gantt.html'
      - 'Project-Plan/Stalled-Blocked-rpt.html'
      - 'Project-Plan/gantt-data.json'
      - 'Project-Plan/outcome-stall-overlay.json'
      - 'Project-Plan/github-stall-live.js'
      - 'Scripts/sync-outcome-stall-overlay.js'
      - 'WSA/'
      - 'WSB-WSC/WB/'
      - 'WSB-WSC/'
      - 'WSB-WSC/wsb-wsc-outcome-dependencies.json'
      - 'WSB-WSC/dependency-sources.yml'
      - 'WSA/PA/pa-outcomes.json'
      - '.github/workflows/deploy-capability-map.yml'
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Stalled-Blocked-rpt.html loads this JSON from the same origin; local file is gitignored.
      - name: Optional Stalled-Blocked GitHub PAT for Lambda
        env:
          STALLED_BLOCKED_GITHUB_PAT: ${{ secrets.STALLED_BLOCKED_GITHUB_PAT }}
        run: |
          if [ -z "${STALLED_BLOCKED_GITHUB_PAT:-}" ]; then
            echo "No STALLED_BLOCKED_GITHUB_PAT — deploy JSON token file for Stalled-Blocked-rpt on Lambda, or use ?github_token= in the URL."
            exit 0
          fi
          node -e "const fs=require('fs');const t=process.env.STALLED_BLOCKED_GITHUB_PAT;if(!t)process.exit(0);fs.writeFileSync('Project-Plan/Stalled-Blocked-github-token.local.json',JSON.stringify({github_token:t}));"
          echo "Wrote Project-Plan/Stalled-Blocked-github-token.local.json for deploy zip (not committed)."

      - name: Create deployment package
        run: |
          cd Capability-map
          zip -r ../deploy.zip index.mjs capability-map.html capability-map-dmsi.html capability-map-state.json capability-map-artifacts-dmsi.json
          cd ../Project-Plan
          # Root of zip: legacy Lambda URLs …/Combined-Outcome-Gantt.html; Milestones/ at zip root for same-origin fetches
          zip -g ../deploy.zip Combined-Outcome-Gantt.html github-stall-live.js Stalled-Blocked-rpt.html gantt-data.json outcome-stall-overlay.json
          zip -g ../deploy.zip Milestones/milestones.html Milestones/milestone_capability_xref.html Milestones/project-milestones.json
          zip -j -g ../deploy.zip Milestones/milestones.html
          if [ -f Stalled-Blocked-github-token.local.json ]; then
            zip -g ../deploy.zip Stalled-Blocked-github-token.local.json
          fi
          cd ..
          # Repo-style paths: …/Project-Plan/Combined-Outcome-Gantt.html (Confluence / bookmarks)
          zip -g deploy.zip \
            Project-Plan/Combined-Outcome-Gantt.html \
            Project-Plan/Stalled-Blocked-rpt.html \
            Project-Plan/gantt-data.json \
            Project-Plan/outcome-stall-overlay.json \
            Project-Plan/github-stall-live.js \
            Project-Plan/Milestones/milestones.html \
            Project-Plan/Milestones/milestone_capability_xref.html \
            Project-Plan/Milestones/project-milestones.json
          if [ -f Project-Plan/Stalled-Blocked-github-token.local.json ]; then
            zip -g deploy.zip Project-Plan/Stalled-Blocked-github-token.local.json
          fi
          # Repo-relative URL ../../Project-Plan/Milestones/project-milestones.json (WM/PA/VI outcome maps)
          zip -r deploy.zip WSA/WM WSA/VI WSA/PA WSB-WSC/WB
          zip -j -g deploy.zip WSB-WSC/WSB-WSC-Outcome-Map.html
          zip -j -g deploy.zip WSB-WSC/wsb-wsc-outcome-dependencies.json WSB-WSC/dependency-sources.yml
          echo "Package size: $(du -h deploy.zip | cut -f1)"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://deploy.zip

      - name: Wait for Lambda to be updated
        run: |
          aws lambda wait function-updated \
            --function-name "${{ secrets.LAMBDA_FUNCTION_NAME }}"

      - name: Deployment summary
        run: |
          echo "Deployed capability-map to Lambda: ${{ secrets.LAMBDA_FUNCTION_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
