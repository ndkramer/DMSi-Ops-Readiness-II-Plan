<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMSi Phase 2: Milestone–Capability Cross-Reference</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F3F5F7;
  --surface: #FFFFFF;
  --surface2: #EEF1F5;
  --surface3: #E4E9EF;
  --border: #D1D9E0;
  --border-light: #B8C4CE;
  --text: #1A2A3A;
  --text-dim: #4A6070;
  --text-muted: #8A9DB0;
  --accent: #2563EB;
  --green: #5A9E28;
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; font-size:14px; }

/* ── Header ── */
.page-header {
  background:#1B2A4A;
  border-bottom:3px solid #76BE43;
  padding:20px 32px;
  display:flex; align-items:center; justify-content:space-between; gap:20px;
}
.header-brand { display:flex; align-items:center; gap:14px; }
.header-logo {
  width:38px; height:38px; background:#76BE43; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-weight:800; font-size:17px; color:#1B2A4A; flex-shrink:0;
}
.header-eyebrow { font-size:10px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#76BE43; margin-bottom:3px; }
.header-title { font-family:'Syne',sans-serif; font-size:21px; font-weight:700; color:#FFFFFF; }
.header-meta { font-size:11px; color:rgba(255,255,255,0.5); text-align:right; line-height:1.7; }

/* ── Legend ── */
.legend-bar {
  background:var(--surface2);
  border-bottom:1px solid var(--border);
  padding:10px 32px;
  display:flex; align-items:center; gap:20px; flex-wrap:wrap;
}
.legend-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); white-space:nowrap; }
.legend-items { display:flex; gap:18px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-dim); }
.legend-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* ── Main ── */
.main { padding:28px 32px 72px; overflow-x:auto; }

/* ── Matrix ── */
.matrix-wrap { min-width:1080px; }
.matrix-table { width:100%; border-collapse:collapse; table-layout:fixed; }
.col-cap { width:210px; }

/* Milestone header */
.th-milestone {
  background:var(--surface2);
  border:1px solid var(--border);
  padding:14px 10px 12px;
  text-align:center; vertical-align:top;
}
.milestone-id {
  font-family:'Syne',sans-serif; font-size:17px; font-weight:800;
  color:#2563EB; display:block; margin-bottom:3px;
}
.milestone-name { font-size:11px; font-weight:600; color:var(--text); display:block; line-height:1.3; margin-bottom:5px; }
.milestone-target {
  font-size:10px; color:var(--text-dim);
  background:var(--bg); padding:2px 8px; border-radius:10px; border:1px solid var(--border);
  display:inline-block;
}
.milestone-date {
  font-size:10px; font-weight:600; color:var(--text-muted);
  display:block; margin-top:6px; line-height:1.35;
}
.milestone-link-btn {
  margin:6px auto 0; padding:0; border:none; background:transparent; cursor:pointer;
  color:var(--accent); display:flex; align-items:center; justify-content:center;
  border-radius:6px; line-height:0; transition:background 0.15s, color 0.15s;
}
.milestone-link-btn:hover { background:var(--surface2); color:#1d4ed8; }
.milestone-link-btn:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }

/* Milestone detail modal */
.ms-modal-overlay {
  display:none; position:fixed; inset:0; z-index:500;
  background:rgba(15,23,42,0.55); backdrop-filter:blur(2px);
  align-items:center; justify-content:center; padding:20px;
}
.ms-modal-overlay.open { display:flex; }
.ms-modal {
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  max-width:920px; width:100%; max-height:90vh; overflow:auto;
  box-shadow:0 24px 48px rgba(0,0,0,0.25);
  position:relative;
}
.ms-modal-head {
  position:sticky; top:0; z-index:1; background:linear-gradient(180deg, var(--surface) 90%, transparent);
  padding:20px 48px 12px 24px; border-bottom:1px solid var(--border);
}
.ms-modal-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#1e3a5f; }
.ms-modal-sub { font-size:12px; color:var(--text-dim); margin-top:4px; }
.ms-modal-close {
  position:absolute; top:14px; right:14px; width:36px; height:36px; border:none; border-radius:8px;
  background:var(--surface2); color:var(--text-dim); cursor:pointer; font-size:18px; line-height:1;
}
.ms-modal-close:hover { background:var(--surface3); color:var(--text); }
.ms-modal-body { padding:16px 24px 28px; }
.ms-section { margin-bottom:22px; }
.ms-section-title {
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.2px;
  color:var(--text-muted); margin-bottom:10px;
}
.detail-card-grid { display:grid; gap:10px; }
.detail-card {
  background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
  padding:12px 14px; border-top:3px solid #7c3aed;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
}
.detail-card-text { font-size:12px; color:var(--text-dim); line-height:1.55; }
.seg-progress {
  display:flex; align-items:center; gap:10px; margin-top:10px; flex-wrap:wrap;
}
.seg-frac { font-size:11px; font-weight:600; color:var(--text-dim); min-width:2.2em; }
.seg-pct { font-size:11px; font-weight:600; color:var(--text-dim); min-width:2.5em; text-align:right; }
.seg-bar {
  display:flex; gap:2px; flex:1; min-width:100px; height:8px; align-items:stretch;
}
.seg-slice {
  flex:1; min-width:3px; border-radius:0; background:#ede9fe;
  box-shadow: inset 0 0 0 1px rgba(124,58,237,0.12);
}
.seg-slice.filled { background:#7c3aed; }
.seg-bar .seg-slice:first-child { border-radius:4px 0 0 4px; }
.seg-bar .seg-slice:last-child { border-radius:0 4px 4px 0; }
.seg-bar .seg-slice:only-child { border-radius:4px; }

/* Capability header */
.th-cap {
  background:var(--surface);
  border:1px solid var(--border);
  padding:12px 14px;
  text-align:left; vertical-align:middle;
  position:sticky; left:0; z-index:2;
}
.ws-badge {
  font-size:9px; font-weight:700; letter-spacing:0.8px; padding:2px 7px;
  border-radius:4px; text-transform:uppercase; display:inline-block; margin-bottom:5px;
}
.cap-name { font-size:13px; font-weight:600; color:var(--text); display:block; }
.cap-sub { font-size:10px; color:var(--text-muted); display:block; margin-top:2px; }

/* Data cells */
.td-cell {
  border:1px solid var(--border);
  padding:8px 7px; vertical-align:middle; text-align:center;
  background:var(--bg); transition:background 0.15s;
}
.td-cell:hover { background:var(--surface); }
.td-cell.filled { background:var(--surface2); }
.td-cell.filled:hover { background:var(--surface3); }

/* Stage badge */
.stage-badge {
  display:inline-flex; flex-direction:column; align-items:center; gap:3px;
  padding:7px 8px; border-radius:7px; border:1px solid;
  cursor:default; width:100%; transition:transform 0.15s, box-shadow 0.15s;
  position:relative;
}
.stage-badge:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(0,0,0,0.35); }
.stage-num { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; }
.stage-short { font-size:9px; font-weight:500; line-height:1.3; opacity:0.82; }

/* Empty dot */
.cell-dot { display:block; width:6px; height:6px; border-radius:50%; background:var(--border); margin:0 auto; opacity:0.35; }

/* WS section row */
.ws-row td {
  background:var(--surface);
  border:1px solid var(--border);
  padding:5px 14px;
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted);
}

/* Tooltip */
.tooltip {
  display:none; position:fixed; z-index:200; max-width:290px;
  background:var(--surface3); border:1px solid var(--border-light);
  border-radius:10px; padding:13px 15px;
  box-shadow:0 10px 28px rgba(0,0,0,0.45); pointer-events:none;
}
.tooltip.show { display:block; }
.tip-cap { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-muted); margin-bottom:4px; }
.tip-name { font-size:13px; font-weight:600; color:var(--text); line-height:1.4; margin-bottom:6px; }
.tip-deliverable { font-size:11px; color:var(--text-dim); line-height:1.55; font-style:italic; }
.tip-m { font-size:10px; font-weight:600; color:#2563EB; margin-top:7px; text-transform:uppercase; letter-spacing:0.5px; }

/* Divider */
.divider { border:none; border-top:1px solid var(--border); margin:32px 0; }

/* Outcomes */
.outcomes-title {
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
  text-transform:uppercase; letter-spacing:2px; color:var(--text-muted); margin-bottom:16px;
}
.outcomes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:12px; }
.outcome-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px; border-top:3px solid #2563EB;
}
.oc-id { font-family:'Syne',sans-serif; font-size:19px; font-weight:800; color:#2563EB; }
.oc-name { font-size:12px; font-weight:600; color:var(--text); margin:2px 0 6px; }
.oc-target {
  font-size:10px; color:var(--text-muted);
  background:var(--bg); padding:2px 8px; border-radius:10px; display:inline-block; margin-bottom:10px;
}
.oc-text { font-size:12px; color:var(--text-dim); line-height:1.65; }

/* Notes */
.notes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:12px; margin-top:32px; }
.note-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
  padding:14px 16px; border-left:3px solid var(--accent);
}
.note-title { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
.note-text { font-size:12px; color:var(--text-dim); line-height:1.6; }
</style>
</head>

/** Same-origin fetch with optional Lambda ?token= gate (mirrors Project-Plan/Milestones/project-milestones.json). */
function fetchUrlWithToken(path) {
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) return path;
  const sep = path.indexOf('?') >= 0 ? '&' : '?';
  return path + sep + 'token=' + encodeURIComponent(token);
}

function milestoneDateLineFromLabel(label) {
  if (!label || typeof label !== 'string') return '';
  const idx = label.indexOf(':');
  return idx >= 0 ? label.slice(idx + 1).trim() : '';
}

function datesByMilestoneId(json) {
  const map = {};
  (json && json.milestones || []).forEach(m => {
    if (m.id && m.label) map[m.id] = milestoneDateLineFromLabel(m.label);
  });
  return map;
}

function buildThead(dateMap) {
  const linkIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>`;
  let thead = `<thead><tr>
  <th class="th-cap col-cap" style="background:var(--bg);border:1px solid var(--border);"></th>`;
  milestones.forEach(m => {
    const line = dateMap[m.id];
    const dateHtml = line ? `<span class="milestone-date">${line}</span>` : '';
    const hasDetail = milestoneDetails[m.id];
    const linkBtn = hasDetail
      ? `<button type="button" class="milestone-link-btn" data-ms="${m.id}" title="Milestone details" aria-label="Open details for ${m.id}">${linkIcon}</button>`
      : '';
    thead += `<th class="th-milestone">
    <span class="milestone-id">${m.id}</span>
    <span class="milestone-name">${m.name}</span>
    <span class="milestone-target">${m.target}</span>
    ${dateHtml}
    ${linkBtn}
  </th>`;
  });
  thead += '</tr></thead>';
  return thead;
}

// Body rows
let tbody = '<tbody>';
let lastWs = null;

capabilities.forEach(cap => {
  if (cap.ws !== lastWs) {
    lastWs = cap.ws;
    const w = workstreams[cap.ws];
    tbody += `<tr class="ws-row"><td colspan="${milestones.length + 1}">
      <span style="color:${w.color}">${w.label}</span>
    </td></tr>`;
  }

  tbody += `<tr>
    <td class="th-cap" style="border-left:3px solid ${cap.color}; background:var(--surface);">
      <span class="ws-badge" style="background:${cap.color}20; color:${cap.color}; border:1px solid ${cap.color}40;">WS-${cap.ws}</span>
      <span class="cap-name">${cap.name}</span>
      <span class="cap-sub">${cap.sub}</span>
    </td>`;

  milestones.forEach(m => {
    const stages = cap.stages[m.id];
    if (stages && stages.length) {
      tbody += `<td class="td-cell filled">`;
      stages.forEach(s => {
        const safeData = JSON.stringify({ cap: cap.name, m: m.id, mn: m.name, ...s }).replace(/'/g,"&#39;");
        tbody += `<div class="stage-badge"
          style="background:${cap.color}18; border-color:${cap.color}50; color:${cap.color};"
          data-tip='${safeData}'
          onmouseenter="showTip(event,this)"
          onmouseleave="hideTip()">
          <span class="stage-num">${s.num}</span>
          <span class="stage-short">${trunc(s.name, 30)}</span>
        </div>`;
      });
      tbody += `</td>`;
    } else {
      tbody += `<td class="td-cell"><span class="cell-dot"></span></td>`;
    }
  });

  tbody += '</tr>';
});

tbody += '</tbody>';

fetch(fetchUrlWithToken('project-milestones.json'), { cache: 'no-store' })
  .then(r => (r.ok ? r.json() : Promise.reject(new Error('milestones json'))))
  .then(j => {
    matrix.innerHTML = buildThead(datesByMilestoneId(j)) + tbody;
  })
  .catch(() => {
    matrix.innerHTML = buildThead(datesByMilestoneId(FALLBACK_PROJECT_MILESTONES)) + tbody;
  });

// Outcomes
const outcomesEl = document.getElementById('outcomes');
milestones.forEach(m => {
  outcomesEl.innerHTML += `<div class="outcome-card">
    <div class="oc-id">${m.id}</div>
    <div class="oc-name">${m.name}</div>
    <span class="oc-target">${m.target}</span>
    <div class="oc-text">${m.outcome}</div>
  </div>`;
});

// Notes
const notesEl = document.getElementById('notes');
notes.forEach(n => {
  notesEl.innerHTML += `<div class="note-card">
    <div class="note-title">${n.title}</div>
    <div class="note-text">${n.text}</div>
  </div>`;
});

/* ══════════════════════════════════ MILESTONE DETAIL MODAL ═══════════════════════════════════ */

const msModalOverlay = document.getElementById('msModalOverlay');
const msModal = document.getElementById('msModal');

function setMsModalOpen(open) {
  if (open) {
    msModalOverlay.classList.add('open');
    msModalOverlay.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  } else {
    msModalOverlay.classList.remove('open');
    msModalOverlay.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
  }
}

function renderSegBar(done, total) {
  const t = Math.max(1, total | 0);
  const d = Math.min(t, Math.max(0, done | 0));
  const pct = t ? Math.round(100 * d / t) : 0;
  let slices = '';
  for (let i = 0; i < t; i++) {
    slices += `<div class="seg-slice${i < d ? ' filled' : ''}"></div>`;
  }
  return `<div class="seg-progress" role="group" aria-label="Progress: ${d} of ${t} complete">
    <span class="seg-frac">${d} / ${t}</span>
    <div class="seg-bar" role="progressbar" aria-valuemin="0" aria-valuemax="${t}" aria-valuenow="${d}">${slices}</div>
    <span class="seg-pct">${pct}%</span>
  </div>`;
}

function renderDetailItems(items) {
  if (!items || !items.length) return '';
  return items
    .map(
      (item) => `<div class="detail-card">
      <div class="detail-card-text">${item.text}</div>
      ${renderSegBar(item.done, item.total)}
    </div>`
    )
    .join('');
}

function openMsModal(milestoneId) {
  const d = milestoneDetails[milestoneId];
  if (!d) return;
  const title = document.getElementById('msModalTitle');
  const sub = document.getElementById('msModalSub');
  const body = document.getElementById('msModalBody');
  title.textContent = d.title;
  sub.textContent = d.subtitle;
  const sections = [
    ['What', 'what'],
    ['Assumptions', 'assumptions'],
    ['Deliverables', 'deliverables'],
    ['Blockers / risks', 'blockers'],
    ['Out of scope', 'outOfScope'],
    ['Questions', 'questions']
  ];
  body.innerHTML = sections
    .map(([label, key]) => {
      const list = d[key];
      const grid = renderDetailItems(list);
      if (!grid) return '';
      return `<section class="ms-section" aria-label="${label}"><h2 class="ms-section-title">${label}</h2><div class="detail-card-grid">${grid}</div></section>`;
    })
    .filter(Boolean)
    .join('');
  setMsModalOpen(true);
  document.getElementById('msModalClose').focus();
}

function closeMsModal() {
  setMsModalOpen(false);
}

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.milestone-link-btn');
  if (btn && btn.dataset.ms) {
    e.preventDefault();
    openMsModal(btn.dataset.ms);
  }
});
msModalOverlay.addEventListener('click', (e) => {
  if (e.target === msModalOverlay) closeMsModal();
});
msModal.addEventListener('click', (e) => e.stopPropagation());
document.getElementById('msModalClose').addEventListener('click', closeMsModal);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && msModalOverlay.classList.contains('open')) closeMsModal();
});

/* ═══════════════════════════════════════ TOOLTIP ═════════════════════════════════════════════ */

const tip = document.getElementById('tooltip');

function showTip(e, el) {
  const d = JSON.parse(el.dataset.tip);
  tip.innerHTML = `
    <div class="tip-cap">${d.cap}</div>
    <div class="tip-name">Stage ${d.num}: ${d.name}</div>
    <div class="tip-deliverable">${d.del}</div>
    <div class="tip-m">↳ ${d.m}: ${d.mn}</div>
  `;
  tip.classList.add('show');
  moveTip(e);
}
function hideTip() { tip.classList.remove('show'); }
function moveTip(e) {
  const tw = 290, th = 130;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + tw > window.innerWidth - 8) x = e.clientX - tw - 14;
  if (y + th > window.innerHeight - 8) y = e.clientY - th - 14;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}
document.addEventListener('mousemove', e => { if (tip.classList.contains('show')) moveTip(e); });

function trunc(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }
</script>
</body>
